# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json

language: en-US
tone_instructions: >-
  Focus on Go 1.25+ best practices. Test coverage is split across sibling
  files by API entry point — check both before flagging gaps. Two validation
  patterns exist by design: cost estimation warns; recommendations silently
  fall back to defaults.
early_access: false
enable_free_tier: true
reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  commit_status: true
  fail_commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: false
  labeling_instructions: []
  path_filters:
    - '!**/vendor/**'
    - '!**/node_modules/**'
    - '!**/dist/**'
    - '!**/build/**'
    - '!**/.git/**'
    - '!**/.specify/**'
    - '!**/.claude/**'
    - '!**/.gemini/**'
    - '!**/.opencode/**' # Exclude .opencode directory as requested
    - '!**/specs/**'
    - '!.goreleaser.yaml'  # Auto-generated by tools/generate-goreleaser
  path_instructions:
    - path: "**/*.go"
      instructions: |
        Please ensure this Go code is compatible with Go 1.25.8.
        Consider using the latest Go features and best practices.
        Pay special attention to:
        - Error handling with proper error wrapping
        - Use of generics where appropriate
        - Modern Go idioms and patterns
        - Performance optimizations available in Go 1.25.8
        - Proper documentation for exported functions and types
        - Security vulnerabilities and best practices
    - path: "**/*_test.go"
      instructions: |
        Please ensure adequate test coverage for new functionality.
        Consider adding integration tests for complex logic.
        Use Go 1.25.8 testing features where appropriate.
        - Ensure tests cover edge cases and error conditions
        - Check for proper use of testing utilities and patterns
        - Verify test isolation and cleanup
        Project-specific test conventions (do not flag violations):
        - Test coverage is split across files by API entry point.
          estimate_test.go covers EstimateCost (struct API);
          projected_test.go covers GetProjectedCost (tags API). Both test
          the same features via different entry points. Check both before
          flagging missing coverage.
        - Doc comment tiers: TestIntegration_* functions use full
          multi-section doc comments (Test workflow, Prerequisites, Run with).
          Unit tests use only 1-2 sentence summaries. Do not require
          integration-style doc blocks on unit tests.
        - Platform-conditional helpers: createTestZip in downloader_test.go
          is Windows-path infrastructure. On Linux CI, only tar.gz is
          exercised. Do not flag createTestZip as untested.
    - path: "internal/plugin/**"
      instructions: |
        Two intentionally different validation patterns exist:
        - Cost estimation (projected.go, actual.go): uses
          validateNonNegativeFloat64() with warning logs for debugging.
        - Recommendations (recommendations.go): uses silent fallback to
          defaultEBSVolumeGB (100 GB) per edge case spec. Do not suggest
          replacing with validateNonNegativeFloat64.
        Test coverage is split across *_test.go files by API entry point,
        not by feature. Check sibling test files before flagging gaps.
    - path: "internal/router/**"
      instructions: |
        Archive format is platform-conditional: .tar.gz on Linux/macOS,
        .zip on Windows (runtime.GOOS in archiveName()). Both createTestZip
        and createTestTarball helpers exist; on Linux CI only tar.gz runs.
        Do not flag createTestZip as untested or dead code.
    - path: "tools/**"
      instructions: |
        Build-time code generators, not production runtime code. These tools
        fetch AWS pricing data, generate embed files, and produce GoReleaser
        configs. They run during `make develop` or CI, never in the deployed
        binary. Review for correctness of generated output rather than
        production-grade error handling or test coverage.
    - path: "**/Makefile"
      instructions: |
        - Review Makefile for proper targets and dependencies
        - Ensure commands are properly formatted and safe
        - Check for proper variable usage
    - path: "**/*.md"
      instructions: |
        Please ensure documentation is clear and up-to-date.
        Consider adding examples for new features.
        Use proper markdown formatting.
        - Check for broken links and proper documentation structure
        - Ensure examples are accurate and up-to-date
    - path: "go.mod"
      instructions: |
        Please review Go module dependencies for:
        - Security vulnerabilities
        - Compatibility with Go 1.25.8
        - Latest stable versions
        - Proper module structure
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - WIP
      - draft
      - "[skip ci]"
    labels: []
    drafts: false
    base_branches:
      - main
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  tools:
    ast-grep:
      rule_dirs: []
      util_dirs: []
      essential_rules: true
      packages: []
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
      level: default
    hadolint:
      enabled: true
    golangci-lint:
      enabled: false # Disabled as requested
      config_file: ".golangci.yml"
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    semgrep:
      enabled: true
      config_file: ""
    dotenvLint:
      enabled: true
    checkmake:
      enabled: true
    osvScanner:
      enabled: true
chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: auto
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/.cursorrules"
      - "**/CLAUDE.md"
      - "**/GEMINI.md" # Ensure GEMINI.md is included
      - "**/.cursor/rules/*"
      - "**/.windsurfrules"
      - "**/.clinerules/*"
      - "**/.rules/*"
      - "**/AGENT.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    usage: auto
    project_keys: []
  linear:
    usage: auto
    team_keys: []
  pull_requests:
    scope: auto
code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "**/*.go"
        instructions: |
          Generate Go doc comments following project conventions:
          - Start with the function/type name (Go convention)
          - Use complete sentences
          - Exported functions: comprehensive docs with purpose, parameters,
            return values, and error conditions
          - TestIntegration_* functions: full multi-section docs (summary,
            purpose, Test workflow with numbered steps, Prerequisites,
            Run with command)
          - Unit test functions: 1-2 sentence summary only
          - Do not add doc comments to unexported helper functions unless
            the logic is genuinely non-obvious
  unit_tests:
    path_instructions:
      - path: "**/*.go"
        instructions: |
          Generate Go unit tests following project conventions:
          - Use testify (assert.* and require.*) for assertions
          - Use table-driven tests for variations on the same behavior
          - Test both success and error paths with edge cases
          - For pricing client dependencies: use hand-written struct-based
            mocks (see mockPricingClient in internal/plugin/plugin_test.go)
          - Do not use mocking frameworks (mockery, testify/mock) — this
            project uses lightweight hand-written mocks only
          - Do not mock dependencies you don't own — prefer integration
            tests for external service interactions
